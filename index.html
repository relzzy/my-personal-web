<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Relzzy's Webpage</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap"
        rel="stylesheet">

    <style>
        /* Basic setup */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Oswald', sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            min-height: 100vh;
            color: #ffffff;
            position: relative;
        }

        /* --- CHARACTER ART --- */
        .character-art {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -10;
            pointer-events: none;
        }

        /* --- BACKEND STATUS (WALLET STYLE) --- */
        .backend-status {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #ffffff;
            color: #000000;
            font-size: 1.5rem;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            padding: 10px 20px;
            border: 5px solid #000;
            z-index: 9999;
            transform: rotate(-3deg);
            box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.3);
        }

        /* --- NAVIGATION (RIGHT-ALIGNED STAIRCASE) --- */
        .nav-container {
            position: fixed;
            right: 5%;
            top: 50%;
            transform: translateY(-50%) skewY(-8deg);
            display: flex;
            flex-direction: column;
            z-index: 9999;
        }

        nav {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
        }

        nav a {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 900;
            font-style: italic;
            text-decoration: none;
            text-transform: uppercase;
            color: #ffffff;
            background: transparent;
            padding: 10px 20px;
            transition: all 0.15s ease-out;
            text-shadow: 4px 4px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
        }

        /* Jagged Hover State */
        nav a:hover {
            color: #d90000;
            background-color: #000;
            text-shadow: none;
            transform: scale(1.05) rotate(3deg);
            clip-path: polygon(5% 0%, 100% 2%, 96% 100%, 0% 98%);
            z-index: 110;
            position: relative;
        }

        /* --- EASTER EGG BANNER --- */
        .easter-egg-banner {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            background: #000;
            padding: 20px 40px;
            border: 4px solid #fff;
            box-shadow: 10px 10px 0px #d90000;
            text-align: center;
            z-index: 9999;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .easter-egg-banner.show {
            transform: translateX(-50%) translateY(0);
        }

        .easter-egg-banner h2 {
            color: #d90000;
            margin: 0;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            -webkit-text-stroke: 1px #fff;
        }

        .easter-egg-banner p {
            color: #fff;
            margin-top: 5px;
            font-weight: 700;
        }

        /* --- MOBILE RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .character-art {
                height: 60vh;
                left: -20px;
                opacity: 0.8;
            }

            .nav-container {
                left: 5%;
            }

            nav a {
                font-size: 3.5rem;
                -webkit-text-stroke: 2px #000;
            }
        }
    </style>
</head>

<body>

    <img src="character-art.webp" class="character-art" alt="Character Art">

    <div class="backend-status">BACKEND: LIVE</div>

    <div class="nav-container">
        <nav>
            <a href="https://relzzy.github.io/text_rpg_demo/">PLAY RPG DEMO</a>
            <a href="test.html">GOALS</a>
            <a href="input.html">REACH OUT</a>
            <a href="about.html">ABOUT</a>
        </nav>
    </div>



    <div id="secret-banner" class="easter-egg-banner">
        <h2>🎉 SECRET FOUND! 🎉</h2>
        <p>You truly know this place.</p>
    </div>

    <script>
        let inputSequence = '';

        // We listen for key presses
        window.addEventListener('keydown', (e) => {
            // Add key to sequence
            inputSequence += e.key.toLowerCase();

            // Keep sequence manageable (last 10 chars is enough for our words)
            if (inputSequence.length > 10) {
                inputSequence = inputSequence.slice(-10);
            }

            // 1. Check for 'anime' -> REDIRECT
            if (inputSequence.includes('anime')) {
                // Reset sequence to prevent double triggers
                inputSequence = '';
                // Redirect
                window.location.href = 'anime.html';
            }

            // 2. Check for 'relzzy' -> BANNER
            if (inputSequence.includes('relzzy')) {
                inputSequence = '';
                activateBanner();
            }
        });

        function activateBanner() {
            const banner = document.getElementById('secret-banner');
            banner.classList.add('show');
            setTimeout(() => {
                banner.classList.remove('show');
            }, 4000);
        }
    </script>

</body>

</html>
